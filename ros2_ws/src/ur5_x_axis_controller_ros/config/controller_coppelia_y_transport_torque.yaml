# Direct-torque preset: world-Y transport (green-on-green), locked shoulder pan.
# Seeds and task frame match config/coppeliasim_movement_primitives.yaml.

controller:
  control_rate_hz: 100
  use_gravity_compensation: true
  gravity_compensation_source: mujoco
  gravity_compensation_sign: -1.0
  jacobian_singular_cond_max: 100000.0
  torque_headroom: 0.82

  gains:
    kp_x: 60.0
    kd_x: 12.0
    kp_y: 60.0
    kd_y: 12.0
    kp_z: 120.0
    kd_z: 20.0
    kp_rot: 10.0
    kd_rot: 2.0
    kp_posture: 4.0
    kd_posture: 2.0
    kd_joint: 3.0

  torque_limits_initial:
    shoulder_pan_joint: 8.0
    shoulder_lift_joint: 12.0
    elbow_joint: 12.0
    wrist_1_joint: 4.0
    wrist_2_joint: 4.0
    wrist_3_joint: 4.0

  torque_limits_after_stable:
    shoulder_pan_joint: 30.0
    shoulder_lift_joint: 150.0
    elbow_joint: 150.0
    wrist_1_joint: 28.0
    wrist_2_joint: 28.0
    wrist_3_joint: 28.0

  torque_limits_mode: "after_stable"

  torque_rate_limit_nm_per_sec:
    shoulder_pan_joint: 500.0
    shoulder_lift_joint: 1000.0
    elbow_joint: 1000.0
    wrist_1_joint: 500.0
    wrist_2_joint: 500.0
    wrist_3_joint: 500.0

  torque_lowpass_alpha: 0.15

coppeliasim:
  host: "127.0.0.1"
  port: 23000

  startup_joint_positions_rad:
    [0.0, 0.0443244063, -1.67570517, 5.09435844, -6.28345754, 5.96178335]

  ee_object_name: "/UR5/UR5_connection"
  ee_object_name_alternates:
    - ":/UR5/UR5_connection"
    - "/UR5_connection"
    - ":/UR5_connection"
    - "/UR5/connection"
    - ":/UR5/connection"

  task_frame:
    mode: "mujoco_attachment_dummy"
    parent_object_name: ""
    parent_object_name_alternates: []
    attachment_offset_m: [0.0, 0.0, -0.2]
    attachment_quat_wxyz: [-0.7071067811865475, 0.7071067811865475, 0.0, 0.0]
    dummy_size_m: 0.025

  joint_name_map:
    shoulder_pan_joint: "/UR5/joint"
    shoulder_lift_joint: "/UR5/link/joint"
    elbow_joint: "/UR5/link/link/joint"
    wrist_1_joint: "/UR5/link/link/link/joint"
    wrist_2_joint: "/UR5/link/link/link/link/joint"
    wrist_3_joint: "/UR5/link/link/link/link/link/joint"

  torque_application:
    prefer_signed_target_force: true
    fallback_large_velocity_rad_s: 10.0

  jacobian:
    source: numerical
    numerical_epsilon: 1.0e-5

  publish_rate_hz: 100.0
  step_simulation_manually: false

safety:
  # Y is the transport axis; X and Z are held via max_abs_orthogonal_drift_m.
  max_abs_orthogonal_drift_m: 0.25
  max_abs_y_drift_m: 0.50
  max_abs_z_drift_m: 0.25
  max_orientation_error_rad: 1.0
  max_joint_velocity_radps: 3.0
  max_axis_error_growth_steps: 200
  emergency_stop_on_nan: true
  emergency_stop_on_joint_limit: false

logging:
  trace_jsonl_path: ""
  log_controller_debug_hz: 0.0

topics:
  joint_state_topic: "/joint_states"
  ee_pose_topic: "/ur5/ee_pose"
  ee_twist_topic: "/ur5/ee_twist"
  jacobian_topic: "/ur5/jacobian"
  target_x_topic: "/target_x"
  torque_command_topic: "/ur5/torque_command"
  controller_debug_topic: "/ur5/controller_debug"
  safety_status_topic: "/ur5/safety_status"
  gravity_torque_topic: "/ur5/gravity_torque"
