# RL PPO training config for UR5 Y-axis transport in CoppeliaSim.

environment:
  sim_dt_s: 0.005
  action_repeat: 4
  max_episode_steps: 400
  target_dy_m: 0.04
  seed_q_rad: [0.0, 0.0443244063, -1.67570517, 5.09435844, -6.28345754, 5.96178335]
  init_noise_std_rad: 0.02
  tau_max_nm: [30.0, 150.0, 150.0, 28.0, 28.0, 28.0]
  max_joint_velocity_radps: 3.0
  action_scale: 0.25

baseline:
  enabled: true
  mode: residual
  hold_kp: 300.0
  hold_kd: 40.0
  gravity_scale: 1.0
  cart_z_kp: 200.0
  cart_z_kd: 40.0
  y_track_kp: 120.0
  y_track_kd: 20.0
  enable_cart_z: false
  enable_y_tracking: false
  reset_warmup_steps: 20
  residual_scale: 0.25

coppeliasim:
  host: "127.0.0.1"
  port: 23000
  ur5_model_subpath: "models/robots/non-mobile/UR5.ttm"
  ee_object_name: "/UR5/connection"
  ee_object_alternates:
    - ":/UR5/connection"
    - "/UR5/UR5_connection"
    - ":/UR5/UR5_connection"
  task_frame:
    mode: "mujoco_attachment_dummy"
    attachment_offset_m: [0.0, 0.0, -0.2]
    attachment_quat_wxyz: [-0.7071067811865475, 0.7071067811865475, 0.0, 0.0]

reward:
  y_tracking_weight: 2.0
  z_hold_weight: 10.0
  x_hold_weight: 5.0
  orientation_weight: 5.0
  torque_smooth_weight: 0.001
  alive_bonus: 0.5
  terminal_penalty: -10.0

termination:
  max_z_error_m: 0.10
  max_x_error_m: 0.10
  max_orientation_error_rad: 0.5
  max_joint_velocity_radps: 3.0

training:
  algorithm: "PPO"
  total_timesteps: 50000
  n_envs: 2
  base_port: 23000
  port_stride: 2
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  net_arch: [256, 256]
  tensorboard_log: "outputs/rl_logs/"
  model_save_path: "outputs/rl_models/ppo_y_transport"
  save_freq: 10000
  eval_after_train: true
  eval_episodes: 3
