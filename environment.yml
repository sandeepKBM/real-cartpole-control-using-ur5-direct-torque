# Conda environment for the real_Cartpole MuJoCo + ROS 2 + MoveIt + CoppeliaSim workflow.
# This environment is intentionally on Python 3.12 so RoboStack's `moveit_py`
# bindings are available alongside the rest of the Jazzy stack.
#
# Create (from repo root):
#   conda env create -f environment.yml
# Activate:
#   conda activate mujoco_ur5e
#
# Cluster note: container launchers may hardcode
#   /common/users/ss5772/miniforge3/bin/python3
# On a local machine, either activate mujoco_ur5e or set PYTHON_BIN to your env python.
name: mujoco_ur5e
channels:
  - conda-forge
  - robostack-jazzy
dependencies:
  - python=3.12
  - pip
  - wheel
  - setuptools
  - cmake
  - make
  - ninja
  - pkg-config
  - colcon-common-extensions
  - ffmpeg
  - filelock
  - imageio
  - imageio-ffmpeg
  - ipywidgets
  - matplotlib
  - numpy
  - pillow
  - pyyaml
  - tqdm
  - ros-jazzy-desktop
  - ros-jazzy-moveit
  - ros-jazzy-moveit-py
  - ros-jazzy-ros2-control
  - ros-jazzy-ros2-controllers
  - pip:
      - coppeliasim_zmqremoteapi_client>=2.0.4
      - mediapy
      - mujoco>=2.3.3
      - opencv-python-headless>=4.8
      - scipy>=1.11
